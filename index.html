<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RU — Мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.5s ease;
      position: relative;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== АВТОРИЗАЦИЯ ===== */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .logo h1 span {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: #888;
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .form-group:nth-child(4) { animation-delay: 0.4s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 16px;
      font-size: 15px;
      transition: all 0.3s;
      background: #f8f8fa;
      color: #1a1a1a;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      color: #888;
      font-size: 14px;
    }

    .auth-toggle span {
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .auth-toggle span:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #e74c3c;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      border-left: 4px solid #e74c3c;
      animation: shake 0.3s ease;
    }

    .error-message.show {
      display: block;
    }

    .error-message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left-color: #2e7d32;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== ОБЩИЙ ИНТЕРФЕЙС ===== */
    .user-info {
      background: #f8f8fa;
      padding: 14px 20px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .user-info .avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .user-info .user-details {
      flex: 1;
      margin-left: 12px;
    }

    .user-info .user-details .name {
      font-weight: 600;
      color: #1a1a1a;
    }

    .user-info .user-details .nickname {
      font-size: 13px;
      color: #888;
    }

    .user-info .logout-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .user-info .logout-btn:hover {
      background: #fee;
    }

    /* ===== ТАБЫ ===== */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: #f0f0f5;
      border-radius: 14px;
      padding: 4px;
    }

    .tabs button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: #888;
    }

    .tabs button.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .tabs button:hover:not(.active) {
      color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* ===== КОНТАКТЫ ===== */
    .contact {
      padding: 14px 16px;
      background: #f8f8fa;
      border-radius: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 2px solid transparent;
    }

    .contact:hover {
      background: white;
      border-color: #667eea;
      transform: translateX(4px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
    }

    .contact .name {
      font-weight: 600;
      color: #1a1a1a;
    }

    .contact .nickname {
      font-size: 13px;
      color: #888;
    }

    .contact .badge {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 11px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== ЧАТ ===== */
    .messages-container {
      max-height: 360px;
      overflow-y: auto;
      padding: 12px;
      background: #f8f8fa;
      border-radius: 16px;
      margin: 12px 0;
    }

    .messages-container::-webkit-scrollbar {
      width: 4px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }

    .message {
      padding: 10px 14px;
      margin: 4px 0;
      border-radius: 14px;
      max-width: 85%;
      word-wrap: break-word;
      animation: slideUp 0.2s ease;
    }

    .message.my {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      background: white;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .message .time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    .message.my .time {
      color: rgba(255,255,255,0.7);
    }

    .message .file-img {
      max-width: 200px;
      border-radius: 12px;
      margin-top: 4px;
      display: block;
    }

    .message audio {
      max-width: 200px;
      height: 40px;
      margin-top: 4px;
      border-radius: 8px;
    }

    /* ===== ВВОД ===== */
    .input-container {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      position: relative;
      align-items: center;
    }

    .input-container input {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 16px;
      font-size: 14px;
      transition: all 0.3s;
      background: #f8f8fa;
      min-width: 60px;
    }

    .input-container input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }

    .input-container button {
      padding: 14px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .input-container button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .input-container .icon-btn {
      padding: 14px 16px;
      background: #f0f0f5;
      color: #667eea;
      border: 2px solid #e8e8e8;
      border-radius: 16px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
      line-height: 1;
    }

    .input-container .icon-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .input-container .icon-btn.recording {
      background: #e74c3c;
      color: white;
      border-color: #e74c3c;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* ===== МЕНЮ СКРЕПКИ ===== */
    #attachMenu {
      display: none;
      position: absolute;
      bottom: 70px;
      right: 0;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      padding: 8px;
      z-index: 100;
      min-width: 180px;
    }

    #attachMenu .menu-item {
      padding: 12px 16px;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: #1a1a1a;
    }

    #attachMenu .menu-item:hover {
      background: #f0f0f5;
    }

    #attachMenu .menu-item .icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
    }

    /* ===== ХЕДЕР ЧАТА ===== */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f0f0;
      margin-bottom: 12px;
    }

    .chat-header .back {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #667eea;
      padding: 4px 8px;
      transition: all 0.3s;
    }

    .chat-header .back:hover {
      transform: translateX(-4px);
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 14px;
    }

    .empty .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .hidden {
      display: none !important;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .search-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 14px;
      font-size: 14px;
      transition: all 0.3s;
      background: #f8f8fa;
    }

    .search-row input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }

    .search-row button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .search-row button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .hidden-file-input {
      display: none;
    }

    .create-channel-btn {
      width: 100%;
      padding: 14px;
      background: #f0f0f5;
      border: 2px dashed #667eea;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }

    .create-channel-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 480px) {
      #app {
        padding: 30px 20px;
        border-radius: 24px;
      }
      .logo-icon {
        width: 60px;
        height: 60px;
        font-size: 26px;
      }
      .logo h1 {
        font-size: 24px;
      }
      .input-container {
        gap: 6px;
        flex-wrap: wrap;
      }
      .input-container input {
        padding: 12px 14px;
        font-size: 13px;
        min-width: 50px;
        flex: 1 1 100%;
      }
      .input-container button {
        padding: 12px 16px;
        font-size: 13px;
      }
      .input-container .icon-btn {
        padding: 12px 14px;
        font-size: 16px;
      }
      #attachMenu {
        right: 0;
        min-width: 150px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '/api';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let selectedUser = null;
    let selectedChannel = null;
    let contacts = [];
    let channels = [];
    let messages = [];
    let isLoginMode = true;
    let isLoading = false;
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let currentTab = 'chats';
    let channelMessages = [];

    function formatTime(date) {
      return new Date(date).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    function showError(message, isSuccess = false) {
      const el = document.getElementById('errorMessage');
      if (el) {
        el.textContent = message;
        el.className = 'error-message show' + (isSuccess ? ' success' : '');
        setTimeout(() => el.classList.remove('show'), 4000);
      } else {
        alert(message);
      }
    }

    async function request(path, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      try {
        const response = await fetch(API + path, {
          ...options,
          headers: { ...headers, ...options.headers }
        });

        const text = await response.text();
        if (!text) throw new Error('Сервер вернул пустой ответ');

        let data;
        try { data = JSON.parse(text); } catch (e) { throw new Error('Сервер вернул невалидный ответ'); }
        if (!response.ok) throw new Error(data.error || 'Ошибка запроса');
        return data;
      } catch (error) {
        console.error('❌ Request error:', error);
        throw error;
      }
    }

    // ========== АВТОРИЗАЦИЯ ==========
    async function register() {
      if (isLoading) return;
      const email = document.getElementById('email').value.trim();
      const name = document.getElementById('name').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !name || !nickname || !password) { showError('❌ Заполните все поля'); return; }
      if (password.length < 4) { showError('❌ Пароль должен быть минимум 4 символа'); return; }

      isLoading = true;
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="loading"></span>';
      btn.disabled = true;

      try {
        const data = await request('/register', {
          method: 'POST',
          body: JSON.stringify({ email, name, nickname, password })
        });
        if (data.success) {
          showError('✅ ' + data.message, true);
          setTimeout(() => { isLoginMode = true; renderAuth(); }, 1000);
        }
      } catch (error) { showError(error.message); }
      finally { isLoading = false; btn.textContent = originalText; btn.disabled = false; }
    }

    async function login() {
      if (isLoading) return;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showError('❌ Заполните email и пароль'); return; }

      isLoading = true;
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="loading"></span>';
      btn.disabled = true;

      try {
        const data = await request('/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        renderApp();
      } catch (error) { showError(error.message); }
      finally { isLoading = false; btn.textContent = originalText; btn.disabled = false; }
    }

    function logout() {
      localStorage.removeItem('token');
      token = null;
      currentUser = null;
      selectedUser = null;
      selectedChannel = null;
      renderAuth();
    }

    // ========== ТАБЫ ==========
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
      
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector(`.tabs button[data-tab="${tab}"]`).classList.add('active');
      
      if (tab === 'chats') {
        loadChats();
      } else if (tab === 'channels') {
        loadChannels();
      }
    }

    // ========== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ==========
    async function searchUsers() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) { contacts = []; renderContacts(); return; }
      try {
        const data = await request('/search/' + encodeURIComponent(query) + `?exclude=${currentUser.id}`);
        contacts = data;
        renderContacts();
      } catch (error) { showError(error.message); }
    }

    // ========== ЛИЧНЫЕ СООБЩЕНИЯ ==========
    async function loadMessages(userId) {
      try {
        console.log('📥 Загрузка сообщений с пользователем ID:', userId);
        const data = await request(`/messages/${currentUser.id}/${userId}`);
        messages = data;
        renderMessages();
      } catch (error) {
        console.error('❌ Ошибка загрузки сообщений:', error);
        showError('Ошибка загрузки сообщений: ' + error.message);
      }
    }

    async function sendMessage() {
      const content = document.getElementById('messageInput').value.trim();
      if (!content || !selectedUser) return;

      try {
        await request('/message', {
          method: 'POST',
          body: JSON.stringify({
            from_user: currentUser.id,
            to_user: selectedUser.id,
            content
          })
        });
        document.getElementById('messageInput').value = '';
        await loadMessages(selectedUser.id);
      } catch (error) { showError(error.message); }
    }

    async function loadChats() {
      try {
        const data = await request(`/chats/${currentUser.id}`);
        contacts = data;
        renderContacts();
      } catch (error) { showError(error.message); }
    }

    // ========== КАНАЛЫ ==========
    async function loadChannels() {
      try {
        const data = await request(`/channels/${currentUser.id}`);
        channels = data;
        renderChannels();
      } catch (error) { showError(error.message); }
    }

    async function loadChannelMessages(channelId) {
      try {
        const data = await request(`/channel/messages/${channelId}`);
        channelMessages = data;
        renderChannelMessages();
      } catch (error) {
        showError('Ошибка загрузки сообщений канала: ' + error.message);
      }
    }

    async function sendChannelMessage() {
      const content = document.getElementById('channelMessageInput').value.trim();
      if (!content || !selectedChannel) return;

      try {
        await request('/channel/message', {
          method: 'POST',
          body: JSON.stringify({
            channel_id: selectedChannel.id,
            from_user: currentUser.id,
            content
          })
        });
        document.getElementById('channelMessageInput').value = '';
        await loadChannelMessages(selectedChannel.id);
      } catch (error) { showError(error.message); }
    }

    function selectChannel(channel) {
      selectedChannel = channel;
      document.getElementById('channelChatView').style.display = 'block';
      document.getElementById('channelListView').style.display = 'none';
      document.getElementById('selectedChannelName').textContent = channel.name;
      document.getElementById('selectedChannelNickname').textContent = channel.nickname ? '@' + channel.nickname : '';
      loadChannelMessages(channel.id);
    }

    function goBackToChannels() {
      selectedChannel = null;
      document.getElementById('channelChatView').style.display = 'none';
      document.getElementById('channelListView').style.display = 'block';
      loadChannels();
    }

    // ========== СОЗДАНИЕ КАНАЛА ==========
    function showCreateChannelModal() {
      document.getElementById('createChannelModal').style.display = 'block';
    }

    function closeCreateChannelModal() {
      document.getElementById('createChannelModal').style.display = 'none';
    }

    async function createChannel() {
      const name = document.getElementById('channelName').value.trim();
      const nickname = document.getElementById('channelNickname').value.trim();
      const isPrivate = document.getElementById('channelPrivate').checked;

      if (!name) {
        showError('❌ Введите название канала');
        return;
      }

      try {
        const data = await request('/channel/create', {
          method: 'POST',
          body: JSON.stringify({
            name,
            nickname: nickname || undefined,
            is_private: isPrivate,
            created_by: currentUser.id
          })
        });

        if (data.success) {
          showError('✅ Канал создан!', true);
          closeCreateChannelModal();
          loadChannels();
        }
      } catch (error) {
        showError(error.message);
      }
    }

    // ========== ОТРИСОВКА ==========
    function renderContacts() {
      const container = document.getElementById('contactsList');
      if (!container) return;

      if (contacts.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="icon">🔍</span>
            ${document.getElementById('searchInput')?.value ? 'Никого не найдено' : 'Начните поиск друзей'}
          </div>
        `;
        return;
      }

      container.innerHTML = contacts.map(c => {
        const contactId = c.id || c.contact_id;
        const name = c.name || 'Без имени';
        const nickname = c.nickname || 'unknown';
        const lastMessage = c.last_message || '';
        
        return `
          <div class="contact" onclick="selectUser({id: ${contactId}, name: '${name}', nickname: '${nickname}'})">
            <div>
              <div class="name">${name}</div>
              <div class="nickname">@${nickname}</div>
            </div>
            ${lastMessage ? `<span class="badge">${lastMessage.slice(0, 30)}${lastMessage.length > 30 ? '...' : ''}</span>` : ''}
          </div>
        `;
      }).join('');
    }

    function renderChannels() {
      const container = document.getElementById('channelsList');
      if (!container) return;

      if (channels.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="icon">📢</span>
            У вас нет каналов
          </div>
        `;
        return;
      }

      container.innerHTML = channels.map(c => `
        <div class="contact" onclick="selectChannel(${JSON.stringify(c).replace(/"/g, '&quot;')})">
          <div>
            <div class="name">${c.name}</div>
            <div class="nickname">${c.nickname ? '@' + c.nickname : 'Приватный'}</div>
          </div>
          <span class="badge">${c.is_private ? '🔒' : '🌐'}</span>
        </div>
      `).join('');
    }

    function renderChannelMessages() {
      const container = document.getElementById('channelMessagesList');
      if (!container) return;

      if (channelMessages.length === 0) {
        container.innerHTML = `<div class="empty"><span class="icon">💬</span>Начните общение в канале</div>`;
        return;
      }

      container.innerHTML = channelMessages.map(m => {
        const isMy = m.from_user === currentUser.id;
        return `
          <div class="message ${isMy ? 'my' : 'other'}">
            ${!isMy ? `<div style="font-size:11px;opacity:0.7;margin-bottom:3px;">${m.from_name || 'Пользователь'}</div>` : ''}
            ${m.content || ''}
            <div class="time">${formatTime(m.timestamp)}</div>
          </div>
        `;
      }).join('');
      
      setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
    }

    function selectUser(user) {
      if (!user || !user.id) {
        showError('❌ Ошибка: пользователь не имеет ID');
        return;
      }

      selectedUser = user;
      selectedChannel = null;
      document.getElementById('chatView').style.display = 'block';
      document.getElementById('contactsView').style.display = 'none';
      document.getElementById('selectedUserName').textContent = user.name || 'Пользователь';
      document.getElementById('selectedUserNickname').textContent = '@' + (user.nickname || 'unknown');
      loadMessages(user.id);
    }

    function goBackToChats() {
      selectedUser = null;
      document.getElementById('chatView').style.display = 'none';
      document.getElementById('contactsView').style.display = 'block';
      loadChats();
    }

    function renderMessages() {
      const container = document.getElementById('messagesList');
      if (!container) return;

      if (messages.length === 0) {
        container.innerHTML = `<div class="empty"><span class="icon">💬</span>Начните переписку</div>`;
        return;
      }

      container.innerHTML = messages.map(m => {
        const isMy = m.from_user === currentUser.id;
        let contentHtml = '';

        if (m.content) {
          contentHtml += m.content;
        }

        if (m.file_url && m.file_type?.startsWith('image/')) {
          contentHtml += `<img src="${m.file_url}" class="file-img" alt="Фото" />`;
        }

        if (m.is_voice && m.file_url) {
          contentHtml += `
            <audio controls>
              <source src="${m.file_url}" type="${m.file_type || 'audio/webm'}">
              Ваш браузер не поддерживает аудио
            </audio>
          `;
        }

        return `
          <div class="message ${isMy ? 'my' : 'other'}">
            ${!isMy ? `<div style="font-size:11px;opacity:0.7;margin-bottom:3px;">${m.from_name || 'Собеседник'}</div>` : ''}
            ${contentHtml}
            <div class="time">${formatTime(m.timestamp)}</div>
          </div>
        `;
      }).join('');
      
      setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
    }

    // ========== МЕНЮ СКРЕПКИ ==========
    function toggleAttachMenu() {
      const menu = document.getElementById('attachMenu');
      if (menu.style.display === 'block') {
        menu.style.display = 'none';
      } else {
        menu.style.display = 'block';
        setTimeout(() => {
          document.addEventListener('click', closeAttachMenu);
        }, 10);
      }
    }

    function closeAttachMenu(e) {
      const menu = document.getElementById('attachMenu');
      const btn = document.getElementById('attachBtn');
      if (menu && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = 'none';
        document.removeEventListener('click', closeAttachMenu);
      }
    }

    // ========== ФОТО ==========
    function triggerFileUpload() {
      document.getElementById('fileInput').click();
      document.getElementById('attachMenu').style.display = 'none';
    }

    async function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file || !selectedUser) {
        e.target.value = '';
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        showError('❌ Файл слишком большой! Максимум 5MB');
        e.target.value = '';
        return;
      }

      if (!file.type.startsWith('image/')) {
        showError('❌ Можно отправлять только изображения!');
        e.target.value = '';
        return;
      }

      showError('⏳ Загрузка фото...', true);

      try {
        const reader = new FileReader();
        reader.onloadend = async function() {
          const base64 = reader.result;
          
          try {
            const data = await request('/upload', {
              method: 'POST',
              body: JSON.stringify({
                from_user: currentUser.id,
                to_user: selectedUser.id,
                file_data: base64,
                file_name: file.name,
                file_type: file.type
              })
            });
            
            if (data.success) {
              await loadMessages(selectedUser.id);
              showError('✅ Фото отправлено!', true);
            } else {
              showError('❌ Ошибка загрузки фото: ' + (data.error || 'Неизвестная ошибка'));
            }
          } catch (error) {
            console.error('❌ Upload error:', error);
            showError('❌ Ошибка загрузки фото: ' + error.message);
          }
        };
        reader.readAsDataURL(file);
      } catch (error) {
        console.error('❌ File read error:', error);
        showError('❌ Ошибка чтения файла: ' + error.message);
      }

      e.target.value = '';
    }

    // ========== ГОЛОСОВЫЕ (ОТДЕЛЬНАЯ КНОПКА) ==========
    function toggleVoiceRecord() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    async function startRecording() {
      if (isRecording) return;
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = async () => {
            const base64Audio = reader.result;
            
            // Отправляем в личный чат или канал
            if (selectedUser) {
              try {
                await request('/message', {
                  method: 'POST',
                  body: JSON.stringify({
                    from_user: currentUser.id,
                    to_user: selectedUser.id,
                    content: '🎤 Голосовое сообщение',
                    file_url: base64Audio,
                    file_type: 'audio/webm',
                    is_voice: true
                  })
                });
                await loadMessages(selectedUser.id);
              } catch (error) {
                showError('❌ Ошибка отправки голосового: ' + error.message);
              }
            } else if (selectedChannel) {
              try {
                await request('/channel/message', {
                  method: 'POST',
                  body: JSON.stringify({
                    channel_id: selectedChannel.id,
                    from_user: currentUser.id,
                    content: '🎤 Голосовое сообщение',
                    file_url: base64Audio,
                    file_type: 'audio/webm',
                    is_voice: true
                  })
                });
                await loadChannelMessages(selectedChannel.id);
              } catch (error) {
                showError('❌ Ошибка отправки голосового: ' + error.message);
              }
            }
          };
          reader.readAsDataURL(audioBlob);
          
          stream.getTracks().forEach(track => track.stop());
          const voiceBtn = document.getElementById('voiceBtn');
          if (voiceBtn) voiceBtn.classList.remove('recording');
          isRecording = false;
        };

        mediaRecorder.start();
        isRecording = true;
        const voiceBtn = document.getElementById('voiceBtn');
        if (voiceBtn) voiceBtn.classList.add('recording');
        showError('🎤 Запись... Нажмите ещё раз для отправки', true);
      } catch (error) {
        showError('❌ Нет доступа к микрофону: ' + error.message);
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        showError('✅ Голосовое отправлено!', true);
      }
    }

    // ========== ЭКРАН АВТОРИЗАЦИИ ==========
    function renderAuth() {
      document.getElementById('app').innerHTML = `
        <div class="logo">
          <div class="logo-icon">RU</div>
          <h1>Мессенджер <span>RU</span></h1>
          <p>${isLoginMode ? 'Войдите в свой аккаунт' : 'Создайте новый аккаунт'}</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="authForm" onsubmit="event.preventDefault(); ${isLoginMode ? 'login()' : 'register()'}">
          <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="example@mail.ru" required />
          </div>

          ${!isLoginMode ? `
            <div class="form-group">
              <label>Имя</label>
              <input id="name" placeholder="Алексей" required />
            </div>
            <div class="form-group">
              <label>Никнейм</label>
              <input id="nickname" placeholder="alex92" required />
            </div>
          ` : ''}

          <div class="form-group">
            <label>Пароль</label>
            <input id="password" type="password" placeholder="${isLoginMode ? 'Введите пароль' : 'Минимум 4 символа'}" required />
          </div>

          <button type="submit" class="btn-primary">
            ${isLoginMode ? 'Войти' : 'Создать аккаунт'}
          </button>
        </form>

        <div class="auth-toggle">
          ${isLoginMode ? 'Нет аккаунта?' : 'Уже есть аккаунт?'}
          <span onclick="isLoginMode = !isLoginMode; renderAuth();">
            ${isLoginMode ? 'Зарегистрироваться' : 'Войти'}
          </span>
        </div>
      `;

      document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); isLoginMode ? login() : register(); }
      });
    }

    // ========== ЭКРАН ЧАТА ==========
    function renderApp() {
      const avatar = currentUser.name.charAt(0).toUpperCase();
      
      document.getElementById('app').innerHTML = `
        <div class="user-info">
          <div style="display:flex;align-items:center;">
            <div class="avatar">${avatar}</div>
            <div class="user-details">
              <div class="name">${currentUser.name}</div>
              <div class="nickname">@${currentUser.nickname}</div>
            </div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Выйти">⏻</button>
        </div>

        <div class="tabs">
          <button data-tab="chats" class="active" onclick="switchTab('chats')">💬 Чаты</button>
          <button data-tab="channels" onclick="switchTab('channels')">📢 Каналы</button>
        </div>

        <!-- Вкладка Чаты -->
        <div id="tab-chats" class="tab-content active">
          <div id="contactsView">
            <div class="search-row">
              <input id="searchInput" placeholder="🔍 Найти по никнейму..." />
              <button onclick="searchUsers()">Найти</button>
            </div>
            <div id="contactsList"></div>
          </div>

          <div id="chatView" style="display:none;">
            <div class="chat-header">
              <button class="back" onclick="goBackToChats()">←</button>
              <div>
                <div id="selectedUserName" style="font-weight:600;color:#1a1a1a;"></div>
                <div id="selectedUserNickname" style="font-size:13px;color:#888;"></div>
              </div>
            </div>
            
            <div class="messages-container" id="messagesList"></div>
            
            <div class="input-container">
              <input id="messageInput" placeholder="Введите сообщение..." />
              <button onclick="sendMessage()">Отправить</button>
              <button class="icon-btn" id="voiceBtn" onclick="toggleVoiceRecord()" title="Голосовое">🎤</button>
              <button class="icon-btn" id="attachBtn" onclick="toggleAttachMenu()" title="Прикрепить">📎</button>
              
              <div id="attachMenu">
                <div class="menu-item" onclick="triggerFileUpload()">
                  <span class="icon">🖼️</span> Фото
                </div>
                <div class="menu-item" onclick="alert('Скоро будет доступно! 📄')">
                  <span class="icon">📄</span> Документ
                </div>
                <div class="menu-item" onclick="alert('Скоро будет доступно! 📍')">
                  <span class="icon">📍</span> Локация
                </div>
                <div class="menu-item" onclick="alert('Скоро будет доступно! 😊')">
                  <span class="icon">😊</span> Стикер
                </div>
              </div>
            </div>
            
            <input type="file" id="fileInput" class="hidden-file-input" accept="image/*" onchange="handleFileSelect(event)" />
          </div>
        </div>

        <!-- Вкладка Каналы -->
        <div id="tab-channels" class="tab-content">
          <div id="channelListView">
            <button class="create-channel-btn" onclick="showCreateChannelModal()">➕ Создать канал</button>
            <div id="channelsList"></div>
          </div>

          <div id="channelChatView" style="display:none;">
            <div class="chat-header">
              <button class="back" onclick="goBackToChannels()">←</button>
              <div>
                <div id="selectedChannelName" style="font-weight:600;color:#1a1a1a;"></div>
                <div id="selectedChannelNickname" style="font-size:13px;color:#888;"></div>
              </div>
            </div>
            
            <div class="messages-container" id="channelMessagesList"></div>
            
            <div class="input-container">
              <input id="channelMessageInput" placeholder="Введите сообщение в канал..." />
              <button onclick="sendChannelMessage()">Отправить</button>
              <button class="icon-btn" onclick="toggleVoiceRecord()" title="Голосовое">🎤</button>
            </div>
          </div>
        </div>

        <!-- Модалка создания канала -->
        <div id="createChannelModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; display:none; justify-content:center; align-items:center;">
          <div style="background:white; border-radius:24px; padding:32px; max-width:400px; width:90%;">
            <h3 style="margin-bottom:16px;">📢 Создать канал</h3>
            
            <div class="form-group">
              <label>Название канала *</label>
              <input id="channelName" placeholder="Мой канал" />
            </div>
            
            <div class="form-group">
              <label>Никнейм канала (для публичного)</label>
              <input id="channelNickname" placeholder="my-channel" />
              <div style="font-size:12px;color:#888;margin-top:4px;">ru-mes.vercel.app/c/<span id="channelPreview">никнейм</span></div>
            </div>
            
            <div class="form-group" style="display:flex; align-items:center; gap:10px;">
              <input type="checkbox" id="channelPrivate" style="width:18px;height:18px;" />
              <label style="margin:0;">Приватный канал (по приглашению)</label>
            </div>
            
            <button class="btn-primary" onclick="createChannel()">Создать</button>
            <button class="btn-primary" style="background:#e74c3c; margin-top:8px;" onclick="closeCreateChannelModal()">Отмена</button>
          </div>
        </div>
      `;

      // Обработчики Enter
      document.getElementById('searchInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchUsers();
      });
      
      document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      document.getElementById('channelMessageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendChannelMessage();
      });

      // Превью ссылки
      document.getElementById('channelNickname').addEventListener('input', function() {
        document.getElementById('channelPreview').textContent = this.value || 'никнейм';
      });

      loadChats();
      loadChannels();
    }

    // ========== ЗАПУСК ==========
    async function init() {
      if (token) {
        try {
          const user = await request('/me');
          currentUser = user;
          renderApp();
        } catch (error) {
          localStorage.removeItem('token');
          token = null;
          renderAuth();
        }
      } else {
        renderAuth();
      }
    }

    async function initDatabase() {
      try {
        await fetch(API + '/init', { method: 'POST' });
        console.log('✅ База инициализирована');
      } catch (e) {
        console.log('ℹ️ База уже существует или ошибка:', e.message);
      }
    }
    
    initDatabase();
    init();
  </script>
