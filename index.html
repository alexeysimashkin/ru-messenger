<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RU Мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #app {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    h1, h2 {
      color: #1a1a1a;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 28px;
      text-align: center;
    }
    
    h2 {
      font-size: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #6c63ff;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }
    
    button:hover {
      background: #5a52d5;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
    }
    
    .btn-secondary {
      background: #e0e0e0;
      color: #1a1a1a;
    }
    
    .btn-secondary:hover {
      background: #d0d0d0;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    .contact {
      padding: 12px 16px;
      background: #f8f8f8;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .contact:hover {
      background: #6c63ff;
      color: white;
      transform: translateX(5px);
    }
    
    .contact .name {
      font-weight: 600;
    }
    
    .contact .nickname {
      opacity: 0.7;
      font-size: 13px;
    }
    
    .messages-container {
      margin: 15px 0;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
      border-radius: 12px;
    }
    
    .message {
      padding: 8px 12px;
      margin: 5px 0;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
    }
    
    .message.my {
      background: #6c63ff;
      color: white;
      margin-left: auto;
    }
    
    .message.other {
      background: #e8e8e8;
      color: #1a1a1a;
    }
    
    .message .sender {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 3px;
    }
    
    .message .time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 3px;
      text-align: right;
    }
    
    .search-container {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }
    
    .search-container input {
      flex: 1;
    }
    
    .search-container button {
      width: auto;
      padding: 12px 24px;
      margin: 0;
    }
    
    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 2px solid #f0f0f0;
      margin-bottom: 15px;
    }
    
    .chat-header .back {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 0 10px;
      width: auto;
    }
    
    .input-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .input-container input {
      flex: 1;
    }
    
    .input-container button {
      width: auto;
      padding: 12px 24px;
      margin: 0;
    }
    
    .auth-switch {
      text-align: center;
      margin-top: 15px;
      color: #6c63ff;
      cursor: pointer;
      font-weight: 600;
    }
    
    .auth-switch:hover {
      text-decoration: underline;
    }
    
    .user-info {
      background: #f8f8f8;
      padding: 10px 16px;
      border-radius: 12px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .user-info .logout {
      background: #ff4757;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      width: auto;
      margin: 0;
    }
    
    .user-info .logout:hover {
      background: #ff3838;
    }
    
    .empty {
      text-align: center;
      color: #999;
      padding: 30px 0;
    }
    
    .badge {
      background: #6c63ff;
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '/api';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let selectedUser = null;
    let contacts = [];
    let messages = [];
    let isLoginMode = true;

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function formatTime(date) {
      return new Date(date).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    async function request(path, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      const response = await fetch(API + path, {
        ...options,
        headers: { ...headers, ...options.headers }
      });

      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error || 'Ошибка запроса');
      }
      
      return data;
    }

    // ========== АВТОРИЗАЦИЯ ==========
    async function register() {
      const email = document.getElementById('email').value;
      const name = document.getElementById('name').value;
      const nickname = document.getElementById('nickname').value;
      const password = document.getElementById('password').value;

      if (!email || !name || !nickname || !password) {
        alert('Заполните все поля');
        return;
      }

      try {
        const data = await request('/register', {
          method: 'POST',
          body: JSON.stringify({ email, name, nickname, password })
        });
        
        if (data.success) {
          alert('✅ Регистрация успешна! Теперь войдите.');
          isLoginMode = true;
          renderAuth();
        }
      } catch (error) {
        alert('❌ ' + error.message);
      }
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Заполните email и пароль');
        return;
      }

      try {
        const data = await request('/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        renderApp();
      } catch (error) {
        alert('❌ ' + error.message);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      token = null;
      currentUser = null;
      selectedUser = null;
      renderAuth();
    }

    // ========== ПОИСК ==========
    async function searchUsers() {
      const query = document.getElementById('searchInput').value.trim();
      
      if (!query) {
        contacts = [];
        renderContacts();
        return;
      }

      try {
        const data = await request('/search/' + encodeURIComponent(query));
        contacts = data.filter(u => u.id !== currentUser.id);
        renderContacts();
      } catch (error) {
        alert('❌ ' + error.message);
      }
    }

    // ========== СООБЩЕНИЯ ==========
    async function loadMessages(userId) {
      try {
        const data = await request(`/messages/${currentUser.id}/${userId}`);
        messages = data;
        renderMessages();
      } catch (error) {
        alert('❌ ' + error.message);
      }
    }

    async function sendMessage() {
      const content = document.getElementById('messageInput').value.trim();
      
      if (!content || !selectedUser) return;

      try {
        await request('/message', {
          method: 'POST',
          body: JSON.stringify({
            from_user: currentUser.id,
            to_user: selectedUser.id,
            content
          })
        });
        
        document.getElementById('messageInput').value = '';
        await loadMessages(selectedUser.id);
      } catch (error) {
        alert('❌ ' + error.message);
      }
    }

    async function loadChats() {
      try {
        const data = await request(`/chats/${currentUser.id}`);
        contacts = data;
        renderContacts();
      } catch (error) {
        alert('❌ ' + error.message);
      }
    }

    // ========== ОТРИСОВКА ==========
    function selectUser(user) {
      selectedUser = user;
      document.getElementById('chatView').style.display = 'block';
      document.getElementById('contactsView').style.display = 'none';
      document.getElementById('selectedUserName').textContent = user.name;
      loadMessages(user.id);
    }

    function goBack() {
      selectedUser = null;
      document.getElementById('chatView').style.display = 'none';
      document.getElementById('contactsView').style.display = 'block';
      loadChats();
    }

    function renderContacts() {
      const container = document.getElementById('contactsList');
      
      if (contacts.length === 0) {
        container.innerHTML = '<div class="empty">🤷‍♂️ Никого не найдено</div>';
        return;
      }

      container.innerHTML = contacts.map(c => `
        <div class="contact" onclick="selectUser(${JSON.stringify(c).replace(/"/g, '&quot;')})">
          <div>
            <div class="name">${c.name}</div>
            <div class="nickname">@${c.nickname}</div>
          </div>
          ${c.last_message ? `<span class="badge">${c.last_message.slice(0, 30)}...</span>` : ''}
        </div>
      `).join('');
    }

    function renderMessages() {
      const container = document.getElementById('messagesList');
      
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty">💬 Начните переписку</div>';
        return;
      }

      container.innerHTML = messages.map(m => {
        const isMy = m.from_user === currentUser.id;
        return `
          <div class="message ${isMy ? 'my' : 'other'}">
            ${!isMy ? `<div class="sender">${m.from_name}</div>` : ''}
            ${m.content}
            <div class="time">${formatTime(m.timestamp)}</div>
          </div>
        `;
      }).join('');
      
      container.scrollTop = container.scrollHeight;
    }

    function renderAuth() {
      document.getElementById('app').innerHTML = `
        <h1>💬 RU Мессенджер</h1>
        
        <div class="form-group">
          <input id="email" type="email" placeholder="Email" />
        </div>
        
        ${isLoginMode ? '' : `
          <div class="form-group">
            <input id="name" placeholder="Имя" />
          </div>
          <div class="form-group">
            <input id="nickname" placeholder="Никнейм" />
          </div>
        `}
        
        <div class="form-group">
          <input id="password" type="password" placeholder="Пароль" />
        </div>
        
        <button onclick="${isLoginMode ? 'login()' : 'register()'}">
          ${isLoginMode ? 'Войти' : 'Зарегистрироваться'}
        </button>
        
        <div class="auth-switch" onclick="isLoginMode = !isLoginMode; renderAuth();">
          ${isLoginMode ? 'Нет аккаунта? Зарегистрируйтесь' : 'Уже есть аккаунт? Войдите'}
        </div>
      `;

      // Отправка по Enter
      document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          isLoginMode ? login() : register();
        }
      });
    }

    function renderApp() {
      document.getElementById('app').innerHTML = `
        <div class="user-info">
          <div>
            <strong>${currentUser.name}</strong> 
            <span style="opacity:0.6;font-size:13px;">@${currentUser.nickname}</span>
          </div>
          <button class="logout" onclick="logout()">Выйти</button>
        </div>

        <div id="contactsView">
          <div class="search-container">
            <input id="searchInput" placeholder="🔍 Поиск по никнейму" />
            <button onclick="searchUsers()">Найти</button>
          </div>
          
          <div id="contactsList"></div>
        </div>

        <div id="chatView" style="display:none;">
          <div class="chat-header">
            <button class="back" onclick="goBack()">←</button>
            <span id="selectedUserName" style="font-weight:600;"></span>
            <span style="opacity:0.6;font-size:13px;" id="selectedUserNickname"></span>
          </div>
          
          <div class="messages-container" id="messagesList"></div>
          
          <div class="input-container">
            <input id="messageInput" placeholder="Введите сообщение..." />
            <button onclick="sendMessage()">Отправить</button>
          </div>
        </div>
      `;

      // Обработчики Enter
      document.getElementById('searchInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchUsers();
      });
      
      document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      // Загрузка чатов
      loadChats();
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function init() {
      if (token) {
        try {
          const user = await request('/me');
          currentUser = user;
          renderApp();
        } catch (error) {
          localStorage.removeItem('token');
          token = null;
          renderAuth();
        }
      } else {
        renderAuth();
      }
    }

    init();
  </script>
</body>
</html>
