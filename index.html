<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RU — Мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .logo h1 span {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: #888;
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .form-group:nth-child(4) { animation-delay: 0.4s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 16px;
      font-size: 15px;
      transition: all 0.3s;
      background: #f8f8fa;
      color: #1a1a1a;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      color: #888;
      font-size: 14px;
    }

    .auth-toggle span {
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .auth-toggle span:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #e74c3c;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      border-left: 4px solid #e74c3c;
      animation: shake 0.3s ease;
    }

    .error-message.show {
      display: block;
    }

    .error-message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left-color: #2e7d32;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .user-info {
      background: #f8f8fa;
      padding: 14px 20px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .user-info .avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .user-info .user-details {
      flex: 1;
      margin-left: 12px;
    }

    .user-info .user-details .name {
      font-weight: 600;
      color: #1a1a1a;
    }

    .user-info .user-details .nickname {
      font-size: 13px;
      color: #888;
    }

    .user-info .logout-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .user-info .logout-btn:hover {
      background: #fee;
    }

    .contact {
      padding: 14px 16px;
      background: #f8f8fa;
      border-radius: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 2px solid transparent;
    }

    .contact:hover {
      background: white;
      border-color: #667eea;
      transform: translateX(4px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
    }

    .contact .name {
      font-weight: 600;
      color: #1a1a1a;
    }

    .contact .nickname {
      font-size: 13px;
      color: #888;
    }

    .contact .badge {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 11px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .messages-container {
      max-height: 360px;
      overflow-y: auto;
      padding: 12px;
      background: #f8f8fa;
      border-radius: 16px;
      margin: 12px 0;
    }

    .messages-container::-webkit-scrollbar {
      width: 4px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }

    .message {
      padding: 10px 14px;
      margin: 4px 0;
      border-radius: 14px;
      max-width: 85%;
      word-wrap: break-word;
      animation: slideUp 0.2s ease;
    }

    .message.my {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      background: white;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .message .time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    .message.my .time {
      color: rgba(255,255,255,0.7);
    }

    .input-container {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .input-container input {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 16px;
      font-size: 14px;
      transition: all 0.3s;
      background: #f8f8fa;
    }

    .input-container input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }

    .input-container button {
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .input-container button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f0f0;
      margin-bottom: 12px;
    }

    .chat-header .back {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #667eea;
      padding: 4px 8px;
      transition: all 0.3s;
    }

    .chat-header .back:hover {
      transform: translateX(-4px);
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 14px;
    }

    .empty .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .hidden {
      display: none !important;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .search-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 14px;
      font-size: 14px;
      transition: all 0.3s;
      background: #f8f8fa;
    }

    .search-row input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }

    .search-row button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .search-row button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    @media (max-width: 480px) {
      #app {
        padding: 30px 20px;
        border-radius: 24px;
      }
      .logo-icon {
        width: 60px;
        height: 60px;
        font-size: 26px;
      }
      .logo h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '/api';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let selectedUser = null;
    let contacts = [];
    let messages = [];
    let isLoginMode = true;
    let isLoading = false;

    function formatTime(date) {
      return new Date(date).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    function showError(message, isSuccess = false) {
      const el = document.getElementById('errorMessage');
      if (el) {
        el.textContent = message;
        el.className = 'error-message show' + (isSuccess ? ' success' : '');
        setTimeout(() => el.classList.remove('show'), 4000);
      } else {
        alert(message);
      }
    }

    // ========== ОСНОВНАЯ ФУНКЦИЯ ЗАПРОСОВ ==========
    async function request(path, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      try {
        const response = await fetch(API + path, {
          ...options,
          headers: { ...headers, ...options.headers }
        });

        const text = await response.text();
        
        if (!text) {
          throw new Error('Сервер вернул пустой ответ');
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          console.error('❌ Невалидный JSON:', text);
          throw new Error('Сервер вернул невалидный ответ');
        }
        
        if (!response.ok) {
          throw new Error(data.error || 'Ошибка запроса');
        }
        
        return data;
      } catch (error) {
        console.error('❌ Request error:', error);
        throw error;
      }
    }

    // ========== АВТОРИЗАЦИЯ ==========
    async function register() {
      if (isLoading) return;
      
      const email = document.getElementById('email').value.trim();
      const name = document.getElementById('name').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !name || !nickname || !password) {
        showError('❌ Заполните все поля');
        return;
      }

      if (password.length < 4) {
        showError('❌ Пароль должен быть минимум 4 символа');
        return;
      }

      isLoading = true;
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="loading"></span>';
      btn.disabled = true;

      try {
        const data = await request('/register', {
          method: 'POST',
          body: JSON.stringify({ email, name, nickname, password })
        });
        
        if (data.success) {
          showError('✅ ' + data.message, true);
          setTimeout(() => {
            isLoginMode = true;
            renderAuth();
          }, 1000);
        }
      } catch (error) {
        showError(error.message);
      } finally {
        isLoading = false;
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    async function login() {
      if (isLoading) return;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('❌ Заполните email и пароль');
        return;
      }

      isLoading = true;
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="loading"></span>';
      btn.disabled = true;

      try {
        const data = await request('/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        renderApp();
      } catch (error) {
        showError(error.message);
      } finally {
        isLoading = false;
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    function logout() {
      localStorage.removeItem('token');
      token = null;
      currentUser = null;
      selectedUser = null;
      renderAuth();
    }

    // ========== ПОИСК ==========
    async function searchUsers() {
      const query = document.getElementById('searchInput').value.trim();
      
      if (!query) {
        contacts = [];
        renderContacts();
        return;
      }

      try {
        const data = await request('/search/' + encodeURIComponent(query) + `?exclude=${currentUser.id}`);
        contacts = data;
        renderContacts();
      } catch (error) {
        showError(error.message);
      }
    }

    // ========== СООБЩЕНИЯ ==========
    async function loadMessages(userId) {
      try {
        console.log('📥 Загрузка сообщений с пользователем ID:', userId);
        console.log('👤 Текущий пользователь ID:', currentUser.id);
        const data = await request(`/messages/${currentUser.id}/${userId}`);
        console.log('✅ Получено сообщений:', data.length);
        messages = data;
        renderMessages();
      } catch (error) {
        console.error('❌ Ошибка загрузки сообщений:', error);
        showError('Ошибка загрузки сообщений: ' + error.message);
      }
    }

    async function sendMessage() {
      const content = document.getElementById('messageInput').value.trim();
      
      if (!content || !selectedUser) return;

      try {
        await request('/message', {
          method: 'POST',
          body: JSON.stringify({
            from_user: currentUser.id,
            to_user: selectedUser.id,
            content
          })
        });
        
        document.getElementById('messageInput').value = '';
        await loadMessages(selectedUser.id);
      } catch (error) {
        showError(error.message);
      }
    }

    async function loadChats() {
      try {
        const data = await request(`/chats/${currentUser.id}`);
        contacts = data;
        renderContacts();
      } catch (error) {
        showError(error.message);
      }
    }

    // ========== ОТРИСОВКА ==========
    function selectUser(user) {
      console.log('👤 Выбран пользователь:', user);
      console.log('🆔 ID пользователя:', user.id);
      
      if (!user || !user.id) {
        showError('❌ Ошибка: пользователь не имеет ID');
        return;
      }

      selectedUser = user;
      document.getElementById('chatView').style.display = 'block';
      document.getElementById('contactsView').style.display = 'none';
      document.getElementById('selectedUserName').textContent = user.name;
      document.getElementById('selectedUserNickname').textContent = '@' + user.nickname;
      loadMessages(user.id);
    }

    function goBack() {
      selectedUser = null;
      document.getElementById('chatView').style.display = 'none';
      document.getElementById('contactsView').style.display = 'block';
      loadChats();
    }

    function renderContacts() {
      const container = document.getElementById('contactsList');
      
      if (!container) return;

      if (contacts.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="icon">🔍</span>
            ${document.getElementById('searchInput')?.value ? 'Никого не найдено' : 'Начните поиск друзей'}
          </div>
        `;
        return;
      }

      container.innerHTML = contacts.map(c => `
        <div class="contact" onclick="selectUser(${JSON.stringify(c).replace(/"/g, '&quot;')})">
          <div>
            <div class="name">${c.name}</div>
            <div class="nickname">@${c.nickname}</div>
          </div>
          ${c.last_message ? `<span class="badge">${c.last_message.slice(0, 30)}${c.last_message.length > 30 ? '...' : ''}</span>` : ''}
        </div>
      `).join('');
    }

    function renderMessages() {
      const container = document.getElementById('messagesList');
      
      if (!container) return;

      if (messages.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="icon">💬</span>
            Начните переписку
          </div>
        `;
        return;
      }

      container.innerHTML = messages.map(m => {
        const isMy = m.from_user === currentUser.id;
        return `
          <div class="message ${isMy ? 'my' : 'other'}">
            ${!isMy ? `<div style="font-size:11px;opacity:0.7;margin-bottom:3px;">${m.from_name || 'Собеседник'}</div>` : ''}
            ${m.content}
            <div class="time">${formatTime(m.timestamp)}</div>
          </div>
        `;
      }).join('');
      
      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 50);
    }

    // ========== ЭКРАН АВТОРИЗАЦИИ ==========
    function renderAuth() {
      document.getElementById('app').innerHTML = `
        <div class="logo">
          <div class="logo-icon">RU</div>
          <h1>Мессенджер <span>RU</span></h1>
          <p>${isLoginMode ? 'Войдите в свой аккаунт' : 'Создайте новый аккаунт'}</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="authForm" onsubmit="event.preventDefault(); ${isLoginMode ? 'login()' : 'register()'}">
          <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="example@mail.ru" required />
          </div>

          ${!isLoginMode ? `
            <div class="form-group">
              <label>Имя</label>
              <input id="name" placeholder="Алексей" required />
            </div>
            <div class="form-group">
              <label>Никнейм</label>
              <input id="nickname" placeholder="alex92" required />
            </div>
          ` : ''}

          <div class="form-group">
            <label>Пароль</label>
            <input id="password" type="password" placeholder="${isLoginMode ? 'Введите пароль' : 'Минимум 4 символа'}" required />
          </div>

          <button type="submit" class="btn-primary">
            ${isLoginMode ? 'Войти' : 'Создать аккаунт'}
          </button>
        </form>

        <div class="auth-toggle">
          ${isLoginMode ? 'Нет аккаунта?' : 'Уже есть аккаунт?'}
          <span onclick="isLoginMode = !isLoginMode; renderAuth();">
            ${isLoginMode ? 'Зарегистрироваться' : 'Войти'}
          </span>
        </div>
      `;

      document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          isLoginMode ? login() : register();
        }
      });
    }

    // ========== ЭКРАН ЧАТА ==========
    function renderApp() {
      const avatar = currentUser.name.charAt(0).toUpperCase();
      
      document.getElementById('app').innerHTML = `
        <div class="user-info">
          <div style="display:flex;align-items:center;">
            <div class="avatar">${avatar}</div>
            <div class="user-details">
              <div class="name">${currentUser.name}</div>
              <div class="nickname">@${currentUser.nickname}</div>
            </div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Выйти">⏻</button>
        </div>

        <div id="contactsView">
          <div class="search-row">
            <input id="searchInput" placeholder="🔍 Найти по никнейму..." />
            <button onclick="searchUsers()">Найти</button>
          </div>
          
          <div id="contactsList"></div>
        </div>

        <div id="chatView" style="display:none;">
          <div class="chat-header">
            <button class="back" onclick="goBack()">←</button>
            <div>
              <div id="selectedUserName" style="font-weight:600;color:#1a1a1a;"></div>
              <div id="selectedUserNickname" style="font-size:13px;color:#888;"></div>
            </div>
          </div>
          
          <div class="messages-container" id="messagesList"></div>
          
          <div class="input-container">
            <input id="messageInput" placeholder="Введите сообщение..." />
            <button onclick="sendMessage()">Отправить</button>
          </div>
        </div>
      `;

      document.getElementById('searchInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchUsers();
      });
      
      document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      loadChats();
    }

    // ========== ЗАПУСК ==========
    async function init() {
      if (token) {
        try {
          const user = await request('/me');
          currentUser = user;
          renderApp();
        } catch (error) {
          localStorage.removeItem('token');
          token = null;
          renderAuth();
        }
      } else {
        renderAuth();
      }
    }

    // Инициализация базы
    async function initDatabase() {
      try {
        await fetch(API + '/init', { method: 'POST' });
        console.log('✅ База инициализирована');
      } catch (e) {
        console.log('ℹ️ База уже существует или ошибка:', e.message);
      }
    }
    
    initDatabase();
    init();
  </script>
</body>
</html>
