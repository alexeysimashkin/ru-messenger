<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RU — Мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
    }

    #app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 900px;
      background: #0f0f0f;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow: none;
    }

    @media (min-width: 481px) {
      #app {
        border-radius: 24px;
        height: 90vh;
        box-shadow: 0 20px 80px rgba(0,0,0,0.8);
      }
    }

    /* ===== АВТОРИЗАЦИЯ ===== */
    .auth-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 32px;
      background: #0f0f0f;
    }

    .auth-container .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-container .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      color: white;
      font-weight: 700;
    }

    .auth-container .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }

    .auth-container .logo h1 span {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-container .logo p {
      color: #666;
      font-size: 14px;
      margin-top: 4px;
    }

    .auth-container .form-group {
      margin-bottom: 16px;
    }

    .auth-container .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
    }

    .auth-container .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      font-size: 15px;
      transition: all 0.3s;
      background: #1a1a1a;
      color: white;
    }

    .auth-container .form-group input:focus {
      outline: none;
      border-color: #6c5ce7;
      background: #222;
    }

    .auth-container .form-group input::placeholder {
      color: #555;
    }

    .auth-container .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .auth-container .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
    }

    .auth-container .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-container .auth-toggle {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .auth-container .auth-toggle span {
      color: #6c5ce7;
      font-weight: 600;
      cursor: pointer;
    }

    .auth-container .auth-toggle span:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #2a0a0a;
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      border-left: 4px solid #ff6b6b;
    }

    .error-message.show {
      display: block;
    }

    .error-message.success {
      background: #0a2a0a;
      color: #51cf66;
      border-left-color: #51cf66;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== ОСНОВНОЙ ИНТЕРФЕЙС ===== */
    .app-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f0f0f;
      height: 100%;
      overflow: hidden;
    }

    /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
    .top-bar {
      padding: 16px 20px 12px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .top-bar .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar .avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .top-bar .user-details .name {
      color: white;
      font-weight: 600;
      font-size: 16px;
    }

    .top-bar .user-details .nickname {
      color: #666;
      font-size: 13px;
    }

    .top-bar .logout-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      transition: all 0.3s;
    }

    .top-bar .logout-btn:hover {
      color: #ff6b6b;
    }

    /* ===== ВКЛАДКИ ===== */
    .tabs {
      display: flex;
      gap: 0;
      background: #1a1a1a;
      border-radius: 0;
      padding: 0;
      flex-shrink: 0;
      border-bottom: 1px solid #222;
    }

    .tabs button {
      flex: 1;
      padding: 14px 16px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: #666;
      border-bottom: 3px solid transparent;
    }

    .tabs button.active {
      color: #6c5ce7;
      border-bottom-color: #6c5ce7;
      background: transparent;
    }

    .tabs button:hover:not(.active) {
      color: #aaa;
    }

    /* ===== КОНТЕНТ ===== */
    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      background: #0f0f0f;
    }

    .tab-content.active {
      display: block;
    }

    .tab-content::-webkit-scrollbar {
      width: 4px;
    }

    .tab-content::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

    /* ===== ПОИСК ===== */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .search-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      font-size: 14px;
      transition: all 0.3s;
      background: #1a1a1a;
      color: white;
    }

    .search-row input:focus {
      outline: none;
      border-color: #6c5ce7;
      background: #222;
    }

    .search-row input::placeholder {
      color: #555;
    }

    .search-row button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .search-row button:hover {
      transform: scale(1.02);
    }

    /* ===== КОНТАКТЫ / КАНАЛЫ ===== */
    .contact {
      padding: 14px 16px;
      background: #1a1a1a;
      border-radius: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid transparent;
    }

    .contact:hover {
      background: #222;
      border-color: #2a2a2a;
      transform: translateX(4px);
    }

    .contact .left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    .contact .name {
      font-weight: 600;
      color: white;
      font-size: 15px;
    }

    .contact .nickname {
      font-size: 13px;
      color: #666;
    }

    .contact .badge {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 11px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact .last-msg {
      font-size: 13px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 150px;
    }

    .empty {
      text-align: center;
      color: #444;
      padding: 60px 0;
      font-size: 14px;
    }

    .empty .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    /* ===== КНОПКА СОЗДАНИЯ КАНАЛА ===== */
    .create-channel-btn {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      border: 2px dashed #6c5ce7;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      color: #6c5ce7;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }

    .create-channel-btn:hover {
      background: #6c5ce7;
      color: white;
      border-color: #6c5ce7;
    }

    /* ===== ЧАТ ===== */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0 12px;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 12px;
    }

    .chat-header .back {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #6c5ce7;
      padding: 4px 8px;
      transition: all 0.3s;
    }

    .chat-header .back:hover {
      transform: translateX(-4px);
    }

    .chat-header .chat-title {
      flex: 1;
    }

    .chat-header .chat-title .name {
      color: white;
      font-weight: 600;
      font-size: 16px;
    }

    .chat-header .chat-title .sub {
      color: #666;
      font-size: 13px;
    }

    /* ===== СООБЩЕНИЯ ===== */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      min-height: 300px;
      max-height: 400px;
    }

    .messages-container::-webkit-scrollbar {
      width: 4px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

    .message {
      padding: 10px 14px;
      margin: 4px 0;
      border-radius: 14px;
      max-width: 85%;
      word-wrap: break-word;
      animation: slideUp 0.2s ease;
    }

    .message.my {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      background: #1a1a1a;
      color: #ddd;
      border-bottom-left-radius: 4px;
    }

    .message .sender {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 3px;
      color: #888;
    }

    .message .time {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 4px;
      text-align: right;
    }

    .message .file-img {
      max-width: 200px;
      border-radius: 12px;
      margin-top: 4px;
      display: block;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .message .file-img:hover {
      transform: scale(1.02);
    }

    .message audio {
      max-width: 200px;
      height: 40px;
      margin-top: 4px;
      border-radius: 8px;
    }

    /* ===== ПОЛНОЭКРАННОЕ ФОТО ===== */
    .fullscreen-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .fullscreen-overlay.active {
      display: flex;
    }

    .fullscreen-overlay img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 12px;
      object-fit: contain;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ===== ВВОД ===== */
    .input-container {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .input-container input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      font-size: 14px;
      transition: all 0.3s;
      background: #1a1a1a;
      color: white;
      min-width: 60px;
    }

    .input-container input:focus {
      outline: none;
      border-color: #6c5ce7;
      background: #222;
    }

    .input-container input::placeholder {
      color: #555;
    }

    .input-container button {
      padding: 12px 18px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .input-container button:hover {
      transform: scale(1.02);
    }

    .input-container .icon-btn {
      padding: 12px 14px;
      background: #1a1a1a;
      color: #888;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
      line-height: 1;
    }

    .input-container .icon-btn:hover {
      background: #2a2a2a;
      color: white;
    }

    .input-container .icon-btn.recording {
      background: #ff6b6b;
      color: white;
      border-color: #ff6b6b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* ===== МЕНЮ СКРЕПКИ ===== */
    #attachMenu {
      display: none;
      position: absolute;
      bottom: 70px;
      right: 0;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      padding: 8px;
      z-index: 100;
      min-width: 180px;
      border: 1px solid #2a2a2a;
    }

    #attachMenu .menu-item {
      padding: 12px 16px;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: #ddd;
    }

    #attachMenu .menu-item:hover {
      background: #2a2a2a;
    }

    #attachMenu .menu-item .icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
    }

    .hidden-file-input {
      display: none;
    }

    .input-wrapper {
      position: relative;
      flex: 1;
      display: flex;
    }

    /* ===== МОДАЛКА КАНАЛА ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      border: 1px solid #2a2a2a;
    }

    .modal-content h3 {
      color: white;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .modal-content .form-group {
      margin-bottom: 16px;
    }

    .modal-content .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
    }

    .modal-content .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      font-size: 15px;
      transition: all 0.3s;
      background: #0f0f0f;
      color: white;
    }

    .modal-content .form-group input:focus {
      outline: none;
      border-color: #6c5ce7;
    }

    .modal-content .form-group input::placeholder {
      color: #555;
    }

    .modal-content .form-group .hint {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    .modal-content .form-group.checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-content .form-group.checkbox input {
      width: 18px;
      height: 18px;
      accent-color: #6c5ce7;
    }

    .modal-content .form-group.checkbox label {
      margin: 0;
      cursor: pointer;
    }

    .modal-content .btn-secondary {
      width: 100%;
      padding: 14px;
      background: #2a2a2a;
      color: #888;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .modal-content .btn-secondary:hover {
      background: #333;
      color: white;
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 480px) {
      #app {
        max-height: 100vh;
        border-radius: 0;
      }

      .modal-content {
        padding: 24px 20px;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      #app {
        max-height: 95vh;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Полноэкранное фото -->
  <div class="fullscreen-overlay" id="fullscreenOverlay" onclick="closeFullscreen()">
    <img id="fullscreenImage" src="" alt="Фото">
  </div>

  <script>
    const API = '/api';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let selectedUser = null;
    let selectedChannel = null;
    let contacts = [];
    let channels = [];
    let messages = [];
    let channelMessages = [];
    let isLoginMode = true;
    let isLoading = false;
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let currentTab = 'chats';

    function formatTime(date) {
      return new Date(date).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    function showError(message, isSuccess = false) {
      const el = document.getElementById('errorMessage');
      if (el) {
        el.textContent = message;
        el.className = 'error-message show' + (isSuccess ? ' success' : '');
        setTimeout(() => el.classList.remove('show'), 4000);
      } else {
        alert(message);
      }
    }

    // ===== ПОЛНОЭКРАННОЕ ФОТО =====
    function openFullscreen(src) {
      document.getElementById('fullscreenImage').src = src;
      document.getElementById('fullscreenOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeFullscreen() {
      document.getElementById('fullscreenOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    async function request(path, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      try {
        const response = await fetch(API + path, {
          ...options,
          headers: { ...headers, ...options.headers }
        });

        const text = await response.text();
        if (!text) throw new Error('Сервер вернул пустой ответ');

        let data;
        try { data = JSON.parse(text); } catch (e) { throw new Error('Сервер вернул невалидный ответ'); }
        if (!response.ok) throw new Error(data.error || 'Ошибка запроса');
        return data;
      } catch (error) {
        console.error('❌ Request error:', error);
        throw error;
      }
    }

    // ===== АВТОРИЗАЦИЯ =====
    async function register() {
      if (isLoading) return;
      const email = document.getElementById('email').value.trim();
      const name = document.getElementById('name').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !name || !nickname || !password) { showError('❌ Заполните все поля'); return; }
      if (password.length < 4) { showError('❌ Пароль должен быть минимум 4 символа'); return; }

      isLoading = true;
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="loading"></span>';
      btn.disabled = true;

      try {
        const data = await request('/register', {
          method: 'POST',
          body: JSON.stringify({ email, name, nickname, password })
        });
        if (data.success) {
          showError('✅ ' + data.message, true);
          setTimeout(() => { isLoginMode = true; renderAuth(); }, 1000);
        }
      } catch (error) { showError(error.message); }
      finally { isLoading = false; btn.textContent = originalText; btn.disabled = false; }
    }

    async function login() {
      if (isLoading) return;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showError('❌ Заполните email и пароль'); return; }

      isLoading = true;
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="loading"></span>';
      btn.disabled = true;

      try {
        const data = await request('/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        renderApp();
      } catch (error) { showError(error.message); }
      finally { isLoading = false; btn.textContent = originalText; btn.disabled = false; }
    }

      document.getElementById('tab-' + tab).classList.add('active');

    async function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file || !selectedUser) {
        e.target.value = '';
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        showError('❌ Файл слишком большой! Максимум 5MB');
        e.target.value = '';
        return;
      }

      if (!file.type.startsWith('image/')) {
        showError('❌ Можно отправлять только изображения!');
        e.target.value = '';
        return;
      }

      showError('⏳ Загрузка фото...', true);

      try {
        const reader = new FileReader();
        reader.onloadend = async function() {
          const base64 = reader.result;
          
          try {
            const data = await request('/upload', {
              method: 'POST',
              body: JSON.stringify({
                from_user: currentUser.id,
                to_user: selectedUser.id,
                file_data: base64,
                file_name: file.name,
                file_type: file.type
              })
            });
            
            if (data.success) {
              await loadMessages(selectedUser.id);
              showError('✅ Фото отправлено!', true);
            } else {
              showError('❌ Ошибка загрузки фото: ' + (data.error || 'Неизвестная ошибка'));
            }
          } catch (error) {
            console.error('❌ Upload error:', error);
            showError('❌ Ошибка загрузки фото: ' + error.message);
          }
        };
        reader.readAsDataURL(file);
      } catch (error) {
        console.error('❌ File read error:', error);
        showError('❌ Ошибка чтения файла: ' + error.message);
      }

      e.target.value = '';
    }

    // ===== ГОЛОСОВЫЕ =====
    function toggleVoiceRecord() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    async function startRecording() {
      if (isRecording) return;
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = async () => {
            const base64Audio = reader.result;
            
            if (selectedUser) {
              try {
                await request('/message', {
                  method: 'POST',
                  body: JSON.stringify({
                    from_user: currentUser.id,
                    to_user: selectedUser.id,
                    content: '🎤 Голосовое сообщение',
                    file_url: base64Audio,
                    file_type: 'audio/webm',
                    is_voice: true
                  })
                });
                await loadMessages(selectedUser.id);
              } catch (error) {
                showError('❌ Ошибка отправки голосового: ' + error.message);
              }
            } else if (selectedChannel) {
              try {
                await request('/channel/message', {
                  method: 'POST',
                  body: JSON.stringify({
                    channel_id: selectedChannel.id,
                    from_user: currentUser.id,
                    content: '🎤 Голосовое сообщение',
                    file_url: base64Audio,
                    file_type: 'audio/webm',
                    is_voice: true
                  })
                });
                await loadChannelMessages(selectedChannel.id);
              } catch (error) {
                showError('❌ Ошибка отправки голосового: ' + error.message);
              }
            }
          };
          reader.readAsDataURL(audioBlob);
          
          stream.getTracks().forEach(track => track.stop());
          const voiceBtn = document.getElementById('voiceBtn');
          if (voiceBtn) voiceBtn.classList.remove('recording');
          isRecording = false;
        };

        mediaRecorder.start();
        isRecording = true;
        const voiceBtn = document.getElementById('voiceBtn');
        if (voiceBtn) voiceBtn.classList.add('recording');
        showError('🎤 Запись... Нажмите ещё раз для отправки', true);
      } catch (error) {
        showError('❌ Нет доступа к микрофону: ' + error.message);
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        showError('✅ Голосовое отправлено!', true);
      }
    }

        console.log('ℹ️ База уже существует или ошибка:', e.message);
      }
    }
    
    initDatabase();
    init();
  </script>
